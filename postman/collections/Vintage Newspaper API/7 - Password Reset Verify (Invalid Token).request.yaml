$kind: http-request
url: "{{base_url}}/api/password-reset-verify.php"
method: POST
body:
  type: formdata
  content:
    - type: text
      key: token
      value: invalidtoken123
    - type: text
      key: password
      value: newpass123
    - type: text
      key: confirm
      value: newpass123
scripts:
  - type: afterResponse
    code: |-
      pm.test('400 for invalid token', () => {
          pm.response.to.have.status(400);
      });
    language: text/javascript
order: 7000
