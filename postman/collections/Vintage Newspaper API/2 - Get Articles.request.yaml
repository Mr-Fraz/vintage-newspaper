$kind: http-request
name: 2 - Get Articles
url: http://localhost/vintage-newspaper/api/articles.php
method: GET
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Returns articles', () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property('articles');
          pm.expect(json.articles).to.be.an('array');
      });
    language: text/javascript
order: 2000
